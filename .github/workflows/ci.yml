name: Monorepo CI Validation

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  validate-mobile:
    name: Validate Mobile App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-id: 20
          cache: 'npm'
          cache-dependency-path: 'App-Code/package-lock.json'

      - name: Install Mobile Dependencies
        run: |
          cd App-Code
          npm ci --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd App-Code
          npm run lint

      - name: Run Dependency-Cruiser Checks
        run: |
          cd App-Code
          npm run depcruise
